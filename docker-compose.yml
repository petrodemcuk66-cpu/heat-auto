services:
  postgres:
    image: postgres:16-alpine
    container_name: heat_auto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heatauto
    ports:
      - "5432:5432"
    volumes:
      - heat_auto_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: heat_auto_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

volumes:
  heat_auto_pgdata:
